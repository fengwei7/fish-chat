# 应用服务 WEB 访问端口
server:
  port: 8080

sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://116.205.110.130:3306/fish_chat?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true
    username: root
    password: M7PlDMXRsk9_wPReR
    type: com.alibaba.druid.pool.DruidDataSource
    # Druid数据源配置
    druid:
      # 初始化大小
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大连接数
      max-active: 20
      # 获取连接等待超时的时间
      max-wait: 60000
      # 间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 30000
      # 一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 180000
      # 用来检测连接是否有效的sql
      validation-query: SELECT 1
      # 申请连接的时候检测，如果空闲时间大于timeBetweenEvictionRunsMillis，执行validationQuery检测连接是否有效
      test-while-idle: true
      # 申请连接时执行validationQuery检测连接是否有效
      test-on-borrow: true
      # 归还连接时执行validationQuery检测连接是否有效
      test-on-return: false
      # 是否缓存preparedStatement
      pool-prepared-statements: true
      # maxPoolPreparedStatementPerConnectionSize
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 合并多个DruidDataSource的监控数据
      use-global-data-source-stat: true
      # 连接空闲超时时间
      keep-alive: true
      # 连接泄露监测
      remove-abandoned: false
      remove-abandoned-timeout: 1800
      log-abandoned: true
      # 配置连接超时检测
      connect-timeout: 30000
      socket-timeout: 30000
      # 配置连接有效性检测
      validation-query-timeout: 5
      # 配置连接池检测时间
      time-between-connect-error-millis: 5000

  data:
    mongodb:
      host: 116.205.110.130
      port: 27017
      database: fishchat
      username: fishchat
      password: 9tiCBO4AxM9l
