# Fish-Chat 应用配置文件
server:
  port: 8080

# Netty WebSocket 配置
netty:
  websocket:
    port: 8081

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# Sa-Token 配置
sa-token:
  token-name: token
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true

# 安全配置
security:
  password:
    # BCrypt 加密强度（范围 4-31，默认 10）
    # 数值越大计算越慢，安全性越高
    bcrypt-strength: 10



mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_id
      table-underline: true
      logic-delete-field: deleted
    enable-sql-runner: true

# 文件上传配置
file:
  upload:
    # 上传文件保存目录（支持相对路径或绝对路径）
    dir: ./uploads
    # 上传文件的访问 URL 前缀
    access-path: /files/
