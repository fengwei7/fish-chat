<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish-Chat WebSocket 测试客户端</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0d1117; color: #c9d1d9; padding: 20px;
  }
  h1 { color: #58a6ff; margin-bottom: 16px; font-size: 20px; }
  .container { max-width: 900px; margin: 0 auto; }

  .panel {
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    padding: 16px; margin-bottom: 16px;
  }
  .panel h2 { color: #f0f6fc; font-size: 14px; margin-bottom: 12px; }

  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
  label { font-size: 12px; color: #8b949e; min-width: 60px; }
  input, select, textarea {
    background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    color: #c9d1d9; padding: 6px 10px; font-size: 13px; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #58a6ff; }
  input[type="text"] { flex: 1; min-width: 140px; }
  textarea { flex: 1; min-width: 200px; height: 28px; resize: vertical; }

  button {
    background: #238636; color: #fff; border: 1px solid #2ea043; border-radius: 4px;
    padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.danger { background: #da3633; border-color: #f85149; }
  button.danger:hover { background: #f85149; }
  button.secondary { background: #21262d; border-color: #30363d; color: #c9d1d9; }
  button.secondary:hover { background: #30363d; }

  #log {
    background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    height: 360px; overflow-y: auto; padding: 10px; font-size: 12px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-all;
  }
  #log .in  { color: #7ee787; }
  #log .out { color: #a5d6ff; }
  #log .sys { color: #d2a8ff; }
  #log .err { color: #f85149; }
  #log .ts  { color: #484f58; }

  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  }
  .status-dot.off { background: #484f58; }
  .status-dot.on  { background: #3fb950; }
  .badge { font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
  .badge.on { background: #033a16; color: #3fb950; }
  .badge.off { background: #272b33; color: #8b949e; }

  .help { font-size: 11px; color: #484f58; margin-top: 8px; }
  .help b { color: #8b949e; }
</style>
</head>
<body>
<div class="container">
  <h1>Fish-Chat WebSocket 测试</h1>

  <!-- 1. 登录面板 -->
  <div class="panel">
    <h2>1. 登录认证 <span class="badge" id="authBadge">未登录</span></h2>
    <div class="row">
      <label>用户名:</label>
      <input type="text" id="username" placeholder="输入用户名" value="Tom">
      <label>密码:</label>
      <input type="password" id="password" placeholder="输入密码" value="123456">
      <label>昵称:</label>
      <input type="text" id="nickname" placeholder="注册时用" value="Alice" style="max-width:100px">
    </div>
    <div class="row">
      <button onclick="doLogin()">登录</button>
      <button onclick="doRegister()" class="secondary">注册</button>
    </div>
    <div class="row">
      <label>Token:</label>
      <input type="text" id="tokenInput" placeholder="或手动粘贴 Sa-Token" style="flex:1">
      <button onclick="useManualToken()" class="secondary">使用此Token</button>
    </div>
  </div>

  <!-- 2. 连接面板 -->
  <div class="panel">
    <h2>2. WebSocket 连接</h2>
    <div class="row">
      <label>WS 地址:</label>
      <input type="text" id="wsUrl" value="ws://localhost:8081/ws" style="flex:1">
      <button id="btnConnect" onclick="connectWS()">连接</button>
      <button id="btnDisconnect" onclick="disconnectWS()" class="danger" disabled>断开</button>
      <span class="status-dot off" id="wsDot"></span>
      <span class="badge off" id="wsBadge">未连接</span>
    </div>
  </div>

  <!-- 3. 消息发送面板 -->
  <div class="panel">
    <h2>3. 发送消息</h2>
    <div class="row">
      <label>房间类型:</label>
      <select id="roomType">
        <option value="PRIVATE">PRIVATE (单聊)</option>
        <option value="GROUP">GROUP (群组)</option>
        <option value="CHANNEL">CHANNEL (频道)</option>
      </select>
      <label>目标:</label>
      <input type="text" id="targetId" placeholder="对方用户code 或 群/频道code" value="bob" style="max-width:160px">
      <label>类型:</label>
      <select id="msgType">
        <option value="TEXT">TEXT</option>
        <option value="IMAGE">IMAGE</option>
        <option value="FILE">FILE</option>
      </select>
    </div>
    <div class="row">
      <label>内容:</label>
      <input type="text" id="msgContent" placeholder="输入消息内容" value="Hello from test client!" style="flex:1">
      <button onclick="sendMessage()">发送</button>
    </div>
    <div class="row">
      <button onclick="sendHeartbeat()" class="secondary">发送心跳 HEARTBEAT</button>
      <button onclick="sendSync()" class="secondary">发送同步 SYNC</button>
      <label style="margin-left:12px">
        <input type="checkbox" id="autoHeartbeat" checked> 自动心跳 (30s)
      </label>
    </div>
    <div class="row" id="roomCodeHint" style="margin-top:4px">
      <span class="help">
        <b>roomCode 规则:</b>
        PRIVATE → <code>private:alice:bob</code> (按字母序排序两个用户code)；
        GROUP → 群组code；
        CHANNEL → 频道code
      </span>
    </div>
  </div>

  <!-- 4. 消息日志 -->
  <div class="panel">
    <h2>4. 消息日志 <button onclick="clearLog()" class="secondary" style="float:right">清空</button></h2>
    <div id="log"></div>
  </div>
</div>

<script>
// ==================== 状态 ====================
let ws = null;
let token = '';
let myCode = '';
let myName = '';
let heartbeatTimer = null;

// ==================== 日志 ====================
function log(type, msg) {
  const logEl = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  logEl.innerHTML += `<span class="ts">${ts}</span> <span class="${type}">${escapeHtml(msg)}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

// ==================== 认证 ====================
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) { alert('请输入用户名和密码'); return; }

  log('sys', `正在登录: ${username}...`);
  try {
    const res = await fetch('http://localhost:8080/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const json = await res.json();
    log('sys', '登录响应: ' + JSON.stringify(json));

    if (json.code === 200 && json.data && json.data.token) {
      token = json.data.token;
      myCode = json.data.code;
      myName = json.data.nickname || json.data.username;
      document.getElementById('tokenInput').value = token;
      setAuthBadge(true, myName);
      log('sys', `登录成功! code=${myCode}, name=${myName}, token=${token.substring(0,20)}...`);
      document.getElementById('targetId').value = myCode === 'alice' ? 'bob' : 'alice';
    } else {
      log('err', '登录失败: ' + json.message);
    }
  } catch (e) {
    log('err', '登录请求失败: ' + e.message);
  }
}

async function doRegister() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const nickname = document.getElementById('nickname').value.trim();
  if (!username || !password) { alert('请输入用户名和密码'); return; }

  log('sys', `正在注册: ${username}...`);
  try {
    const res = await fetch('http://localhost:8080/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, nickname: nickname || username })
    });
    const json = await res.json();
    log('sys', '注册响应: ' + JSON.stringify(json));

    if (json.code === 200) {
      log('sys', '注册成功，自动登录中...');
      await doLogin();
    } else {
      log('err', '注册失败: ' + json.message);
    }
  } catch (e) {
    log('err', '注册请求失败: ' + e.message);
  }
}

function useManualToken() {
  token = document.getElementById('tokenInput').value.trim();
  if (token) {
    setAuthBadge(true, 'manual');
    log('sys', `已设置手动 Token: ${token.substring(0,20)}...`);
  }
}

function setAuthBadge(on, name) {
  const badge = document.getElementById('authBadge');
  badge.textContent = on ? `已登录: ${name}` : '未登录';
  badge.className = 'badge ' + (on ? 'on' : 'off');
}

// ==================== WebSocket ====================
function connectWS() {
  if (!token) { alert('请先登录获取 Token'); return; }

  const baseUrl = document.getElementById('wsUrl').value.trim();
  const url = baseUrl + '?token=' + encodeURIComponent(token);
  log('sys', `正在连接: ${url}`);

  ws = new WebSocket(url);
  ws.onopen = () => {
    log('sys', 'WebSocket 连接成功!');
    setWsStatus(true);
    if (document.getElementById('autoHeartbeat').checked) {
      startAutoHeartbeat();
    }
  };

  ws.onmessage = (event) => {
    try {
      const pkt = JSON.parse(event.data);
      const pretty = JSON.stringify(pkt, null, 2);
      log('in', '收到 ← ' + pretty);
      handleIncoming(pkt);
    } catch (e) {
      log('in', '收到 ← ' + event.data);
    }
  };

  ws.onclose = (e) => {
    log('sys', `WebSocket 已关闭 (code=${e.code}, reason=${e.reason || '无'})`);
    setWsStatus(false);
    stopAutoHeartbeat();
    ws = null;
  };

  ws.onerror = (e) => {
    log('err', 'WebSocket 错误');
    console.error('WebSocket error:', e);
  };
}

function disconnectWS() {
  stopAutoHeartbeat();
  if (ws) {
    ws.close(1000, '客户端主动关闭');
    ws = null;
  }
  setWsStatus(false);
}

function setWsStatus(on) {
  document.getElementById('wsDot').className = 'status-dot ' + (on ? 'on' : 'off');
  const badge = document.getElementById('wsBadge');
  badge.textContent = on ? '已连接' : '未连接';
  badge.className = 'badge ' + (on ? 'on' : 'off');
  document.getElementById('btnConnect').disabled = on;
  document.getElementById('btnDisconnect').disabled = !on;
}

// ==================== 发送消息 ====================
let reqIdCounter = 0;
function nextReqId() { return 'req-' + (++reqIdCounter) + '-' + Date.now(); }

function sendRaw(cmd, body) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log('err', 'WebSocket 未连接，无法发送');
    return;
  }
  const pkt = { cmd, reqId: nextReqId(), body };
  const json = JSON.stringify(pkt);
  ws.send(json);
  log('out', '发送 → ' + JSON.stringify(pkt, null, 2));
}

function sendMessage() {
  const roomType = document.getElementById('roomType').value;
  const targetId = document.getElementById('targetId').value.trim();
  const msgType = document.getElementById('msgType').value;
  const content = document.getElementById('msgContent').value.trim();

  if (!targetId || !content) { alert('请输入目标用户/群组和消息内容'); return; }

  let roomCode;
  if (roomType === 'PRIVATE') {
    // 按字母序排序两个用户 code 生成 roomCode
    const ids = [myCode, targetId].sort();
    roomCode = `private:${ids[0]}:${ids[1]}`;
    // extra.targetId 用于服务端查找
    const body = { roomCode, roomType, msgType, content, extra: { targetId } };
    // 特殊处理 FILE/IMAGE
    if (msgType === 'IMAGE' || msgType === 'FILE') {
      body.fileName = content;
      body.fileSize = 0;
    }
    sendRaw('MSG', body);
  } else {
    roomCode = targetId;
    const body = { roomCode, roomType, msgType, content };
    if (msgType === 'IMAGE' || msgType === 'FILE') {
      body.fileName = content;
      body.fileSize = 0;
    }
    sendRaw('MSG', body);
  }
}

function sendHeartbeat() {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log('err', 'WebSocket 未连接');
    return;
  }
  const pkt = { cmd: 'HEARTBEAT' };
  ws.send(JSON.stringify(pkt));
  log('out', '发送 → ' + JSON.stringify(pkt));
}

function sendSync() {
  const lastTimestamp = Date.now() - 60000;
  sendRaw('SYNC', { extra: { lastTimestamp } });
}

// ==================== 自动心跳 ====================
function startAutoHeartbeat() {
  stopAutoHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      sendHeartbeat();
    }
  }, 30000);
  log('sys', '自动心跳已启动 (30秒间隔)');
}

function stopAutoHeartbeat() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
}

document.getElementById('autoHeartbeat').addEventListener('change', function() {
  if (this.checked && ws && ws.readyState === WebSocket.OPEN) {
    startAutoHeartbeat();
  } else {
    stopAutoHeartbeat();
  }
});

// ==================== 消息处理 ====================
function handleIncoming(pkt) {
  switch (pkt.cmd) {
    case 'MSG':
      // 收到的聊天消息
      break;
    case 'ACK':
      // 服务端确认
      break;
    case 'ERROR':
      log('err', `服务端错误: ${pkt.body?.content || pkt.message || '未知错误'}`);
      break;
    case 'NOTIFY':
      log('sys', `系统通知: [${pkt.body?.msgType}] ${pkt.body?.content}`);
      break;
    case 'HEARTBEAT':
      // 心跳响应，静默处理
      break;
  }
}
</script>
</body>
</html>
