# Fish-Chat 应用配置文件
server:
  port: 9080

# Netty WebSocket 配置
netty:
  websocket:
    port: 9081

# 数据库配置

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://192.168.1.5:3306/fish_chat?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql_JRW3bf}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      use-global-data-source-stat: true
      keep-alive: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongo_Edj2dr:mongo_zKM5xP@192.168.1.5:27017/fishchat}

  redis:
    host: ${REDIS_HOST:192.168.1.5}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:redis_scCe5W}
    database: 0
    timeout: 3000
